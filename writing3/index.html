    <style>
        :root { --primary: #00796b; --primary-dark: #004d40; --accent: #ff80ab; --bg: #f1f8e9; --card-bg: #ffffff; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; color: #333; }
        .container { width: 100%; max-width: 550px; padding-bottom: 50px; }

        .mini-profile { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: 0 auto 10px; overflow: hidden; display: none; }
        .mini-profile img { width: 100%; height: 100%; object-fit: cover; }
        .progress-bar { height: 8px; background: #e0e0e0; margin: 20px 0; border-radius: 10px; overflow: hidden; }
        .progress-inner { height: 100%; background: linear-gradient(90deg, #80cbc4, var(--accent)); width: 0%; transition: 0.5s ease-in-out; }
        .main-profile-area { text-align: center; margin-bottom: 30px; }
        .main-profile-img { width: 180px; height: 180px; border-radius: 50%; border: 6px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.15); object-fit: cover; background: #eee; }

        .problem-num { font-weight: 900; color: var(--primary); font-size: 0.9rem; margin-bottom: 8px; }
        .problem-text { font-size: 1.15rem; font-weight: 600; line-height: 1.6; color: #1a1a1a; word-break: break-word; overflow-wrap: break-word; }
        .trace-box { background: #fff; border-radius: 15px; padding: 18px; margin-bottom: 20px; border: 2px dashed #80cbc4; min-height: 50px; }
        .trace-content { line-height: 1.8; font-size: 1.05rem; color: #004d40; font-weight: 600; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 18px; box-shadow: 0 12px 30px rgba(0,0,0,0.05); border: 1px solid #e0f2f1; box-sizing: border-box; }
        .step-title { font-weight: 800; font-size: 1.15rem; margin-bottom: 20px; color: var(--primary); text-align: center; background: #e0f2f1; padding: 12px; border-radius: 10px; }
        .options { display: grid; gap: 12px; }
        .option-btn { background: #fff; border: 2px solid #eee; padding: 18px; text-align: left; cursor: pointer; border-radius: 12px; font-size: 1rem; color: #444; font-weight: 500; }
        .option-btn:hover { border-color: var(--accent); background: #fff9c4; }

            box-sizing: border-box; 
            font-size: 1rem;

        }
