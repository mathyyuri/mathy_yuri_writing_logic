<div class="container">
    <div class="header">
        <div id="miniProfile" class="mini-profile">
            <img src="https://raw.githubusercontent.com/mathyyuri/Mathy-Yuri-S-LOGIC-MASTER/main/profile.png" onerror="this.src='https://via.placeholder.com/100'" alt="Mathy Yuri">
        </div>
        <h1>S+ LOGIC MASTER</h1>
    </div>

    <div id="step0">
        <div class="main-profile-area">
            <img src="https://raw.githubusercontent.com/mathyyuri/Mathy-Yuri-S-LOGIC-MASTER/main/profile.png" onerror="this.src='https://via.placeholder.com/200'" class="main-profile-img" alt="Mathy Yuri">
            <h2 id="subjectHeading" style="margin-top:15px; font-weight:900; color:var(--primary-dark);">02. 부등식</h2>
        </div>
        </div>
</div>

<script>
    // ✅ 과목명 설정
    const CURRENT_SUBJECT = "02_부등식"; 
    document.getElementById('subjectHeading').innerText = "02. 부등식";

    // ✅ 최신 구글 앱스 스크립트 URL (마지막에 주신 URL로 교체했습니다)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzoleT3gg2gdtE2XK-EdruzwSMcdKSqwWepsCDoBCjbtfUcOBB3CR6Z7XFgSEZGga5ibg/exec";
    
    // ... 이하 스크립트 로직 동일 ...

    function finishQuiz() {
        let totalScore = 0;
        state.probDetails.forEach(p => {
            p.forEach(res => { if(res === "O") totalScore += 2; });
        });

        document.getElementById('quizArea').style.display = 'none';
        document.getElementById('finish').style.display = 'block';
        document.getElementById('scoreArea').innerText = totalScore;
        
        let payload = {
            name: state.student.name,
            className: state.student.className,
            subject: CURRENT_SUBJECT,
            totalScore: totalScore
        };

        // ✅ 모든 문항의 상세 O/X 기록을 페이로드에 자동 추가
        state.probDetails.forEach((results, idx) => {
            payload[`d${idx + 1}`] = results.join(',');
        });

        fetch(SCRIPT_URL, {
            method: 'POST', 
            mode: 'no-cors',
            body: JSON.stringify(payload)
        }).then(() => {
            document.getElementById('statusMsg').innerText = "기록 전송 완료! 고생하셨습니다.";
        });
    }
</script>
